name = "tec-ec-election"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# Serve static assets for the frontend
[assets]
directory = "public"
binding = "ASSETS"

# Durable Object for rate limiting
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# KV Namespace for OTPs and sessions
[[kv_namespaces]]
binding = "KV"
id = "c2328df4621c4d1f8eab670ca249c26c"

# D1 Database for persistent data
[[d1_databases]]
binding = "DB"
database_name = "tec-ec-election-db"
database_id = "06e0a639-2da4-40e3-ab13-f16a61ceaab9"

[vars]
# Environment variables
# ADMIN_EMAIL = "admin@example.com"
# RESEND_FROM_EMAIL = "voting@election.tecouncil.org"
# RESEND_API_KEY = "..." (set via wrangler secret put RESEND_API_KEY)
